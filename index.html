<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        
        /* Vídeo de Fundo */
        #bg-video {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: -1; filter: brightness(0.3);
        }

        .interface {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; color: #00ff00; font-family: monospace; text-align: center;
        }

        /* Borda do Jogo */
        #jogo-container { 
            width: 800px; height: 600px; border: 4px solid #ff0000; 
            display: none; background: #000;
        }

        /* Força o Ruffle a preencher a borda */
        #jogo-container ruffle-player { width: 100%; height: 100%; }

        button { 
            background: transparent; color: #ff0000; border: 2px solid #ff0000; 
            padding: 20px 40px; cursor: pointer; font-size: 40px; margin-top: 20px;
        }
    </style>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="Rayman & Globox having some friendly conversation.mp4" type="video/mp4">
    </video>

    <div class="interface">
        <h1 id="texto">>> UM MINIJOGO DO SENHOR RAMON FOI ENCONTRADO.<br> SEU AMIGO GLOBOX VAI VOAR.</h1>
        <button id="btn-iniciar" onclick="iniciarTudo()">?</button>
        <div id="jogo-container"></div>
    </div>

    <script>
        function iniciarTudo() {
            document.getElementById('texto').style.display = 'none';
            document.getElementById('btn-iniciar').style.display = 'none';
            document.getElementById('jogo-container').style.display = 'block';
            
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("jogo-container").appendChild(player);
            player.load("slap_flap_go.swf");
        }
    </script>
</body>
</html>
